site_name: Zimo Dashboard
site_description: Internt statusdashboard for Mads og Sverre i Zimo.
site_url: https://zimo-subsea.github.io/status-dashboard/

repo_name: zimo-subsea/status-dashboard
repo_url: https://github.com/zimo-subsea/status-dashboard

theme:
  name: material
  language: nb
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Bytt til lys modus
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Bytt til mørk modus
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Oversikt: index.md
  - Dashboard:
      - dashboard/index.md
      - Denne uken: dashboard/denne-uken.md
      - Beslutninger og risiko: dashboard/beslutninger-risiko.md
  - Pilotkunder:
      - pilotkunder/index.md
      - Kontakt først: pilotkunder/kontakt-forst.md
  - Produkt:
      - produkt/index.md
      - Arkitektur: produkt/arkitektur.md
      - Engineering: produkt/engineering.md
  - Funding:
      - funding/index.md
      - Innovasjon Norge: funding/innovasjon-norge.md
  - Arbeidsform:
      - arbeidsform/index.md
      - Hvordan siden vedlikeholdes: arbeidsform/vedlikehold.md
